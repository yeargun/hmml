<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HMML — browser round-trip</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 32px;
        background: #0b1020;
        color: #e7ecf5;
      }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .sub { color: #93a4c3; margin: 0 0 24px; font-size: 14px; }
      #stats {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 4px 16px;
        font: 13px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
        background: #131a30;
        border: 1px solid #243155;
        border-radius: 12px;
        padding: 16px 20px;
        max-width: 520px;
        margin-bottom: 28px;
      }
      #stats b { color: #9fb4ff; }
      .ok { color: #57d9a3; }
      .stage-wrap { perspective: 800px; }
      #stage .card {
        width: 320px;
        padding: 18px;
        background: linear-gradient(145deg, #20305c 0%, #1b2340 100%);
        border: 1px solid #2d3a63;
        border-radius: 16px;
        box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6);
        transform: rotateY(-18deg) rotateX(6deg);
        transform-style: preserve-3d;
      }
      #stage img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 10px;
        transform: translateZ(40px);
        box-shadow: 0 16px 30px -10px rgba(0, 0, 0, 0.7);
      }
      #stage p { margin: 14px 0 0; font-size: 13px; color: #aebbd8; }
    </style>
  </head>
  <body>
    <h1>HMML — full browser round-trip</h1>
    <p class="sub">Build a PNG → pack into HMML → decode → render. All in the browser, no server-side work.</p>
    <div id="stats">running…</div>
    <div class="stage-wrap"><div id="stage"></div></div>
    <script type="module" src="/examples/browser/demo.js"></script>
  </body>
</html>
